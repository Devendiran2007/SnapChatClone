<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapChat Clone - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="gradient-bg"></div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fa-ghost fas"></i>
                <span>snapchat</span>
            </div>
            <p class="auth-subtitle">Welcome back! Sign in to your account</p>
        </div>

        <div id="auth-error" class="toast">
            <i class="fa-circle-exclamation fas"></i>
            <span id="error-message"></span>
        </div>

        <form id="login-form" onsubmit="event.preventDefault(); login();">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-primary">
                <span>Sign In</span>
                <i class="fa-arrow-right-to-bracket fas"></i>
            </button>
        </form>

        <div class="auth-footer">
            <p>New to Snapchat? <a href="register.html" class="auth-link">Create an account</a></p>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
